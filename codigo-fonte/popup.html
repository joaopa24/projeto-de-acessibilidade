<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; font-family: system-ui, sans-serif; background: #fff; color: #111; }
    header { background: #1a56db; color: white; padding: 14px 16px; }
    header h1 { font-size: 16px; font-weight: 600; }
    header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    main { padding: 16px; }
    .atalhos { font-size: 12px; color: #374151; line-height: 1.8; }
    .atalhos dt { font-weight: 600; color: #1a56db; margin-top: 8px; }
    .atalhos dd { margin-left: 0; color: #6b7280; }
    kbd {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      font-family: monospace;
    }
    footer { border-top: 1px solid #f3f4f6; padding: 10px 16px; font-size: 10px; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>✦ AltVision</h1>
    <p>Acessibilidade visual com IA</p>
  </header>
  <main>
    <dl class="atalhos">
      <dt><kbd>Ctrl+Shift+→</kbd></dt>
      <dd>Próxima imagem sem descrição</dd>
      <dt><kbd>Ctrl+Shift+←</kbd></dt>
      <dd>Imagem anterior sem descrição</dd>
      <dt><kbd>Ctrl+Shift+U</kbd></dt>
      <dd>Descrever imagem em foco</dd>
    </dl>
  </main>
  <footer>Personalize os atalhos em chrome://extensions/shortcuts</footer>
</body>
</html>
